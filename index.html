<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Jamu 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f0c97f;
    --rose: #f4a7b9;
    --deep: #1a0a2e;
    --mid: #2e1a4a;
    --soft: #fce4ec;
    --white: #fff8f0;
    --glow: rgba(240, 201, 127, 0.25);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cormorant Garamond', serif;
    background: var(--deep);
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--white);
    cursor: none;
  }

  /* ── Aurora Background ── */
  #aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .aurora-layer {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    animation: drift 12s ease-in-out infinite alternate;
    opacity: 0.45;
  }
  .a1 { width: 70vw; height: 60vh; background: radial-gradient(circle, #6b21a8, transparent); top: -20%; left: -10%; animation-duration: 14s; }
  .a2 { width: 60vw; height: 50vh; background: radial-gradient(circle, #be185d, transparent); bottom: -15%; right: -5%; animation-duration: 11s; animation-delay: -4s; }
  .a3 { width: 50vw; height: 55vh; background: radial-gradient(circle, #0e7490, transparent); top: 20%; right: 5%; animation-duration: 16s; animation-delay: -8s; }
  .a4 { width: 40vw; height: 40vh; background: radial-gradient(circle, #b45309, transparent); bottom: 10%; left: 10%; animation-duration: 13s; animation-delay: -2s; }
  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.1); }
  }

  /* ── Star Canvas ── */
  #stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  /* ── Custom Cursor ── */
  #cursor {
    position: fixed; width: 10px; height: 10px;
    background: var(--gold); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.05s;
    box-shadow: 0 0 12px 4px var(--glow);
  }

  /* ── Gate Screen ── */
  #gate {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: rgba(10, 4, 22, 0.92);
    backdrop-filter: blur(20px);
    transition: opacity 1s ease, visibility 1s;
  }
  #gate.gone { opacity: 0; visibility: hidden; }
  .gate-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 3.2rem);
    color: var(--gold);
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    animation: fadeUp 1.2s ease forwards;
  }
  .gate-sub {
    font-size: 1.05rem; color: rgba(255,248,240,0.6);
    margin-bottom: 40px; letter-spacing: 0.15em;
    animation: fadeUp 1.4s ease forwards;
  }
  .gate-btn {
    padding: 15px 40px;
    border: 1.5px solid var(--gold);
    background: transparent;
    color: var(--gold);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem; font-weight: 500;
    letter-spacing: 0.2em; text-transform: uppercase;
    border-radius: 60px; cursor: pointer;
    position: relative; overflow: hidden;
    transition: color 0.4s, background 0.4s;
    animation: fadeUp 1.6s ease forwards;
  }
  .gate-btn::before {
    content: ''; position: absolute; inset: 0;
    background: var(--gold);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.4s ease;
    z-index: -1;
  }
  .gate-btn:hover { color: var(--deep); }
  .gate-btn:hover::before { transform: scaleX(1); }

  /* ── Main Card ── */
  .card-wrap { position: relative; z-index: 10; width: 100%; max-width: 560px; padding: 20px; }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(240,201,127,0.2);
    backdrop-filter: blur(18px);
    border-radius: 32px;
    padding: clamp(28px, 5vw, 52px) clamp(24px, 5vw, 48px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    opacity: 0; transform: translateY(30px);
    animation: fadeUp 1s ease 0.5s forwards;
    text-align: center;
  }

  .crown { font-size: 2.8rem; display: block; margin-bottom: 8px; animation: bounce 2.5s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

  .card h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.9rem, 5vw, 2.8rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold), #fff 50%, var(--rose));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1.2; margin-bottom: 6px;
  }

  .card .subtitle {
    font-size: 0.9rem; letter-spacing: 0.25em;
    text-transform: uppercase; color: rgba(255,248,240,0.45);
    margin-bottom: 28px;
  }

  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 28px;
  }

  /* ── Message Box ── */
  #msg-box {
    min-height: 90px; display: flex; align-items: center;
    justify-content: center;
    background: rgba(240,201,127,0.06);
    border: 1px solid rgba(240,201,127,0.12);
    border-radius: 18px; padding: 18px 20px;
    margin-bottom: 20px; transition: opacity 0.4s;
  }
  #msg-text {
    font-size: clamp(0.95rem, 2.5vw, 1.12rem);
    line-height: 1.7; color: rgba(255,248,240,0.9);
    font-style: italic;
  }

  /* ── Letter Typewriter ── */
  #letter-box {
    min-height: 50px; margin-bottom: 24px;
    font-size: 0.9rem; color: rgba(240,201,127,0.75);
    letter-spacing: 0.04em; line-height: 1.6;
  }

  /* ── Magic Button ── */
  .magic-btn {
    position: relative; padding: 14px 36px;
    border: none; border-radius: 50px;
    background: linear-gradient(135deg, #f0c97f, #e07b8a);
    color: var(--deep); font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem; font-weight: 700;
    letter-spacing: 0.1em; cursor: pointer;
    overflow: hidden; transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 6px 30px rgba(240,201,127,0.35);
    margin-bottom: 12px;
  }
  .magic-btn::after {
    content: ''; position: absolute;
    top: -50%; left: -60%; width: 40%; height: 200%;
    background: rgba(255,255,255,0.3);
    transform: skewX(-20deg);
    transition: left 0.5s ease;
  }
  .magic-btn:hover::after { left: 130%; }
  .magic-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(240,201,127,0.5); }
  .magic-btn:active { transform: translateY(0px); }

  /* ── Counter ── */
  #counter {
    font-size: 0.78rem; color: rgba(255,248,240,0.3);
    letter-spacing: 0.2em; text-transform: uppercase;
    margin-top: 6px;
  }

  /* ── Ending ── */
  #ending {
    margin-top: 18px; font-size: 0.85rem;
    color: var(--gold); letter-spacing: 0.18em;
    text-transform: uppercase; opacity: 0;
    transition: opacity 1.5s;
  }

  /* ── Floating Particles ── */
  .particle {
    position: fixed; pointer-events: none; z-index: 50;
    animation: floatUp var(--dur, 3.5s) ease-out forwards;
    font-size: var(--size, 20px);
    left: var(--x, 50%); top: var(--y, 80%);
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-260px) scale(1.6) rotate(40deg); }
  }

  /* ── Sparkle Trail ── */
  .trail {
    position: fixed; pointer-events: none; z-index: 9998;
    font-size: 14px; animation: sparkle 1.2s ease forwards;
    transform: translate(-50%, -50%);
  }
  @keyframes sparkle {
    0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-70%) scale(0.3); }
  }

  /* ── Petal Rain ── */
  .petal {
    position: fixed; z-index: 8; pointer-events: none;
    animation: petalFall linear forwards;
    font-size: 18px; opacity: 0.8;
  }
  @keyframes petalFall {
    0%   { opacity: 0.9; transform: translateY(-20px) rotate(0deg); }
    100% { opacity: 0;   transform: translateY(110vh) rotate(360deg); }
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Music Toggle ── */
  #music-btn {
    position: fixed; bottom: 22px; right: 22px; z-index: 200;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(240,201,127,0.15); border: 1px solid rgba(240,201,127,0.35);
    color: var(--gold); font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px); transition: background 0.3s;
  }
  #music-btn:hover { background: rgba(240,201,127,0.28); }
</style>
</head>
<body>

<div id="aurora">
  <div class="aurora-layer a1"></div>
  <div class="aurora-layer a2"></div>
  <div class="aurora-layer a3"></div>
  <div class="aurora-layer a4"></div>
</div>
<canvas id="stars"></canvas>
<div id="cursor"></div>

<!-- Gate -->
<div id="gate">
  <p class="gate-title">✦ A Surprise Awaits ✦</p>
  <p class="gate-sub">Made with love, just for you</p>
  <button class="gate-btn" onclick="openGate()">Enter &nbsp;✨</button>
</div>

<!-- Main Card -->
<div class="card-wrap">
  <div class="card">
    <span class="crown">👑</span>
    <h1>Happy Birthday<br>Jamu</h1>
    <p class="subtitle">Tap the button for magic ✦</p>
    <div class="divider"></div>

    <div id="msg-box">
      <p id="msg-text">Press the button below to receive your first message 💖</p>
    </div>

    <div id="letter-box"></div>

    <button class="magic-btn" onclick="onMagic(event)">Open Magic &nbsp;💌</button>
    <p id="counter"></p>
    <div id="ending">✦ &nbsp;Made with love, always &nbsp;✦</div>
  </div>
</div>

<button id="music-btn" onclick="toggleMusic()" title="Toggle music">🎵</button>

<audio id="bgm" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<script>
// ── Stars ──────────────────────────────────────────────────────────
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let starsArr = [];
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
function initStars() {
  starsArr = [];
  for (let i = 0; i < 180; i++) {
    starsArr.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + 0.3,
      a: Math.random(),
      speed: Math.random() * 0.008 + 0.003,
      dir: Math.random() > 0.5 ? 1 : -1
    });
  }
}
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  starsArr.forEach(s => {
    s.a += s.speed * s.dir;
    if (s.a > 1 || s.a < 0.05) s.dir *= -1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,248,220,${s.a})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
resizeCanvas(); initStars(); drawStars();
window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

// ── Custom Cursor ──────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
  spawnTrail(e.clientX, e.clientY);
});
let lastTrail = 0;
function spawnTrail(x, y) {
  if (Date.now() - lastTrail < 60) return;
  lastTrail = Date.now();
  const el = document.createElement('div');
  el.className = 'trail';
  el.innerText = ['✦','·','✧','⋆'][Math.floor(Math.random()*4)];
  el.style.left = x + 'px'; el.style.top = y + 'px';
  el.style.color = `hsl(${Math.random()*40 + 30}, 90%, 75%)`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// ── Gate ───────────────────────────────────────────────────────────
function openGate() {
  document.getElementById('gate').classList.add('gone');
  setTimeout(() => document.getElementById('gate').remove(), 1100);
  document.getElementById('bgm').play().catch(()=>{});
  startPetals();
}

// ── Petal Rain ─────────────────────────────────────────────────────
const petalEmojis = ['🌸','🌷','✿','❀','🌺','💮','🪷'];
function dropPetal() {
  const el = document.createElement('div');
  el.className = 'petal';
  el.innerText = petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
  el.style.left = (Math.random()*110 - 5) + 'vw';
  el.style.top  = '-30px';
  const dur = (Math.random()*6 + 6).toFixed(1);
  el.style.animationDuration = dur + 's';
  el.style.fontSize = (Math.random()*10 + 14) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), dur * 1000);
}
function startPetals() {
  setInterval(dropPetal, 900);
}

// ── Messages ───────────────────────────────────────────────────────
const msgs = [
  'You have the kind of smile that quietly makes every room brighter ✨',
  'Cute, graceful, and effortlessly special — that is your natural style 🌸',
  'You make ordinary moments feel magical without even trying 💖',
  'If elegance had a face, it would look a lot like yours 👑',
  'Your laugh deserves its own fan club — it fixes moods instantly 😄',
  'You carry sweetness and confidence in the most beautiful balance 🌷',
  'Today celebrates someone truly lovely, kind, and unforgettable 🎂',
  'You are proof that charm and class can exist together perfectly 💫',
  'Even birthdays look better when they belong to you 🎈',
  'Stay exactly who you are — bright, funny, warm, and wonderful 💝',
  'The world is genuinely a nicer place because you are in it 🌟',
  'Your kindness leaves little sparks wherever you go 🔥',
];
const letters = [
  'Wishing you a year filled with laughter, beautiful surprises, and endless reasons to smile.',
  'May every dream you carry quietly in your heart come true this year.',
  'You deserve all the joy you so freely give to others — tenfold.',
  'Here\'s to you: wonderful, warm, and absolutely one-of-a-kind.',
  'Another year older, but somehow still the most effortlessly lovely person in the room.',
];

let clicks = 0;
const msgBox  = document.getElementById('msg-box');
const msgText = document.getElementById('msg-text');
const letterBox = document.getElementById('letter-box');
const counterEl = document.getElementById('ending');

function onMagic(e) {
  e.stopPropagation();
  clicks++;
  // update message with fade
  msgBox.style.opacity = '0';
  setTimeout(() => {
    msgText.innerText = msgs[(clicks - 1) % msgs.length];
    msgBox.style.opacity = '1';
  }, 400);
  // typewriter letter
  typeLetter(letters[(clicks - 1) % letters.length]);
  // burst
  burst(e.clientX, e.clientY);
  if (clicks >= 5) document.getElementById('ending').style.opacity = '1';
  const c = document.getElementById('counter');
  if (clicks < msgs.length) c.innerText = `✦ ${clicks} of ${msgs.length} messages ✦`;
  else c.innerText = '✦ All messages unlocked ✦';
}

document.body.addEventListener('click', e => {
  if (!document.getElementById('gate')) burst(e.clientX, e.clientY);
});

function burst(x, y) {
  const emojis = ['💖','✨','🌸','💫','⭐','🎉','🌷','💝'];
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.innerText = emojis[Math.floor(Math.random()*emojis.length)];
    const angle = Math.random() * 360;
    const dist  = Math.random() * 120 + 30;
    const tx = x + Math.cos(angle) * dist;
    const ty = y + Math.sin(angle) * dist;
    el.style.setProperty('--x', tx + 'px');
    el.style.setProperty('--y', ty + 'px');
    el.style.setProperty('--dur', (Math.random()*1.5 + 2) + 's');
    el.style.setProperty('--size', (Math.random()*14 + 14) + 'px');
    el.style.left = '0'; el.style.top = '0';
    el.style.cssText += `left:${tx}px;top:${ty}px;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3600);
  }
}

let typeTimer = null;
function typeLetter(text) {
  if (typeTimer) clearInterval(typeTimer);
  letterBox.innerText = '';
  let i = 0;
  typeTimer = setInterval(() => {
    letterBox.innerText += text[i];
    i++;
    if (i >= text.length) clearInterval(typeTimer);
  }, 30);
}

// ── Music ──────────────────────────────────────────────────────────
let muted = false;
const bgm = document.getElementById('bgm');
function toggleMusic() {
  muted = !muted;
  bgm.muted = muted;
  document.getElementById('music-btn').innerText = muted ? '🔇' : '🎵';
}
</script>
</body>
</html>
